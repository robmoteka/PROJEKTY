# =============================================================================
# IT Project OS — Konfiguracja nginx na VPS
# =============================================================================
# Skopiuj na VPS do: /etc/nginx/sites-available/it-project-os
# Aktywuj: sudo ln -s /etc/nginx/sites-available/it-project-os /etc/nginx/sites-enabled/
#
# Po skopiowaniu uruchom Certbot żeby uzyskać SSL:
#   sudo certbot --nginx -d twoja-domena.pl -d www.twoja-domena.pl
#
# ZAMIEŃ "twoja-domena.pl" na swoją domenę w całym pliku przed uruchomieniem!
# =============================================================================

# Przekierowanie HTTP → HTTPS + wyzwanie Let's Encrypt
server {
    listen 80;
    listen [::]:80;
    server_name twoja-domena.pl www.twoja-domena.pl;

    # Katalog wymagany przez Certbot do weryfikacji domeny (HTTP-01 challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Całość ruchu HTTP przekierowujemy na HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Serwer HTTPS — główny blok obsługujący ruch produkcyjny
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name twoja-domena.pl www.twoja-domena.pl;

    # -------------------------------------------------------------------------
    # Certyfikaty SSL — sekcja uzupełniana automatycznie przez Certbot
    # Nie edytuj ręcznie, uruchom: sudo certbot --nginx -d twoja-domena.pl
    # -------------------------------------------------------------------------
    # ssl_certificate /etc/letsencrypt/live/twoja-domena.pl/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/twoja-domena.pl/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # -------------------------------------------------------------------------
    # Nagłówki bezpieczeństwa
    # -------------------------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"              always;
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection       "1; mode=block"           always;

    # -------------------------------------------------------------------------
    # Pliki statyczne — serwowane bezpośrednio z filesystem VPS.
    # Ścieżka odpowiada katalogowi static/ w repozytorium sklonowanym na VPS.
    # -------------------------------------------------------------------------
    location /static/ {
        alias /opt/it-project-os/static/;
        expires 1d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------------------------
    # Moduł Issues — proxy do kontenera module-issues (127.0.0.1:8002)
    #
    # WAŻNE: Trailing slash w proxy_pass oznacza "strip prefix":
    #   /modules/issues/list  →  http://127.0.0.1:8002/list
    # Kontener module-issues "widzi" ścieżki bez prefiksu /modules/issues/
    # -------------------------------------------------------------------------
    location /modules/issues/ {
        proxy_pass         http://127.0.0.1:8002/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Nagłówki HTMX 2.0 — przekazujemy bez modyfikacji do serwisu
        proxy_set_header   HX-Request        $http_hx_request;
        proxy_set_header   HX-Current-URL    $http_hx_current_url;
        proxy_set_header   HX-Target         $http_hx_target;
        proxy_set_header   HX-Trigger        $http_hx_trigger;
    }

    # -------------------------------------------------------------------------
    # Shell — proxy do kontenera shell (127.0.0.1:8001)
    # Obsługuje wszystkie pozostałe ścieżki: /, /login, /callback, /logout itd.
    # -------------------------------------------------------------------------
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Nagłówki HTMX 2.0
        proxy_set_header   HX-Request        $http_hx_request;
        proxy_set_header   HX-Current-URL    $http_hx_current_url;
        proxy_set_header   HX-Target         $http_hx_target;
        proxy_set_header   HX-Trigger        $http_hx_trigger;
        # Obsługa WebSocket (na przyszłość — np. hot-reload w trybie dev na VPS)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        # Timeout dla długich requestów (np. SSE)
        proxy_read_timeout 300s;
    }
}
