version: "3.8"
services:
  gateway:
    image: nginx:alpine
    ports:
      - "5050:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - shell
      - module-issues
      - module-projekty

  shell:
    build: ./shell
    container_name: shell
    env_file:
      - .env
    # Pozwala Shellowi na rozwiązywanie localhost:8080 → Keycloak przez host
    # (potrzebne gdy OIDC_ISSUER używa http://localhost:8080/...)
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - postgres
      - keycloak

  module-issues:
    build: ./module-issues
    container_name: module-issues
    env_file:
      - .env
    depends_on:
      - postgres

  module-projekty:
    build: ./module-projekty
    container_name: module-projekty
    env_file:
      - .env
    depends_on:
      - postgres

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN:-admin}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-admin}"
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-it_os_db}"
      KC_DB_USERNAME: "${POSTGRES_USER:-postgres}"
      KC_DB_PASSWORD: "${POSTGRES_PASSWORD:-secret}"
      KC_DB_SCHEMA: keycloak
      # Wymuszamy stały issuer URL (localhost) niezależnie od sposobu dostępu do Keycloak
      KC_HOSTNAME_URL: "http://localhost:8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
    # Automatyczny import realm przy pierwszym starcie
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    volumes:
      - ./tools/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Skrypty init uruchamiane TYLKO przy pierwszej inicjalizacji bazy (pusty volume)
      - ./init-scripts:/docker-entrypoint-initdb.d:ro

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD}"
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_SERVER_JSON_FILE: "/pgadmin4/servers.json"
    ports:
      - "5080:80"
    volumes:
      - ./tools/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - postgres

  adminer:
    image: adminer
    container_name: adminer
    env_file:
      - .env
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "5081:8080"
    depends_on:
      - postgres

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    env_file:
      - .env
    ports:
      - "5082:8978"
    volumes:
      - ./tools/cloudbeaver/GlobalConfiguration:/opt/cloudbeaver/workspace/GlobalConfiguration
    depends_on:
      - postgres

volumes:
  postgres_data:
