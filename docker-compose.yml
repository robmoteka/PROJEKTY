version: "3.8"
services:
  gateway:
    image: nginx:alpine
    ports:
      - "5050:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - shell
      - module-issues

  shell:
    build: ./shell
    container_name: shell
    env_file:
      - .env
    depends_on:
      - postgres

  module-issues:
    build: ./module-issues
    container_name: module-issues
    env_file:
      - .env
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD}"
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_SERVER_JSON_FILE: "/pgadmin4/servers.json"
    ports:
      - "5080:80"
    volumes:
      - ./tools/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - postgres

  adminer:
    image: adminer
    container_name: adminer
    env_file:
      - .env
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "5081:8080"
    depends_on:
      - postgres

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    env_file:
      - .env
    ports:
      - "5082:8978"
    volumes:
      - ./tools/cloudbeaver/GlobalConfiguration:/opt/cloudbeaver/workspace/GlobalConfiguration
    depends_on:
      - postgres

volumes:
  postgres_data:
