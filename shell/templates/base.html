<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}IT Project OS{% endblock %}</title>

  <!-- Tailwind CSS + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX 2.0 -->
  <script src="https://unpkg.com/htmx.org@2.0.0/dist/htmx.min.js" defer></script>
</head>
<body class="min-h-screen bg-base-200">

  <!-- Nawigacja główna -->
  {% include "partials/navbar.html" %}

  <!-- Kontener głównej treści — cel dla HTMX swap -->
  <main id="main-content" class="container mx-auto p-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
