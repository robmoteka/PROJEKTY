<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}IT Project OS{% endblock %}</title>

  <!-- Tailwind CSS + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX 2.0 — serwowany lokalnie przez Nginx (/static/js/) -->
  <script src="/static/js/htmx.min.js" defer></script>

  <!-- Własne style — uzupełnienie Tailwind + DaisyUI -->
  <link href="/static/css/custom.css" rel="stylesheet" />
</head>
<body class="min-h-screen bg-base-200"
      hx-indicator="#htmx-loading">

  <!-- Nawigacja główna -->
  {% include "partials/navbar.html" %}

  <!-- Globalny wskaźnik ładowania HTMX — widoczny podczas requestów -->
  <div id="htmx-loading"
       class="htmx-indicator fixed top-0 left-0 w-full z-50">
    <progress class="progress progress-primary w-full"></progress>
  </div>

  <!-- Kontener głównej treści — cel dla HTMX swap -->
  <main id="main-content" class="container mx-auto p-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
