<!DOCTYPE html>
<html lang="pl" data-theme="business">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}IT Project OS{% endblock %}</title>

  <!-- Inicjalizacja motywu przed renderem — zapobiega migotaniu (FOUC) -->
  <script>
    (function () {
      var saved = localStorage.getItem('it-theme') || 'business';
      document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>

  <!-- Tailwind CSS + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX 2.0 — serwowany lokalnie przez Nginx (/static/js/) -->
  <script src="/static/js/htmx.min.js" defer></script>

  <!-- Własne style — dodatki do DaisyUI business/light, animacje HTMX -->
  <link href="/static/css/custom.css" rel="stylesheet" />

  <!-- Przełącznik motywu — globalny, wywoływany z navbar -->
  <script>
    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = (current === 'business') ? 'light' : 'business';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('it-theme', next);
      // Aktualizuj ikonę przycisku toggle
      var iconSun  = document.getElementById('icon-sun');
      var iconMoon = document.getElementById('icon-moon');
      if (iconSun && iconMoon) {
        iconSun.classList.toggle('hidden',  next === 'light');
        iconMoon.classList.toggle('hidden', next === 'business');
      }
    }
    // Inicjalizacja ikonki po załadowaniu DOM
    document.addEventListener('DOMContentLoaded', function () {
      var theme = localStorage.getItem('it-theme') || 'business';
      var iconSun  = document.getElementById('icon-sun');
      var iconMoon = document.getElementById('icon-moon');
      if (iconSun && iconMoon) {
        iconSun.classList.toggle('hidden',  theme === 'light');
        iconMoon.classList.toggle('hidden', theme === 'business');
      }
    });
  </script>
</head>
<body class="min-h-screen" hx-indicator="#htmx-loading">

  <!-- Nawigacja główna -->
  {% include "partials/navbar.html" %}

  <!-- Globalny wskaźnik ładowania HTMX — widoczny podczas requestów -->
  <div id="htmx-loading"
       class="htmx-indicator fixed top-0 left-0 w-full z-50">
    <progress class="progress progress-primary w-full h-0.5"></progress>
  </div>

  <!-- Kontener głównej treści — cel dla HTMX swap -->
  <main id="main-content" class="container mx-auto p-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
