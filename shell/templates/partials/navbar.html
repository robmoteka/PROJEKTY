<!-- Pasek nawigacyjny Shell — partial wielokrotnego użytku -->
<div class="navbar bg-base-100 shadow-sm border-b border-base-300 px-4 min-h-14">

  <!-- LEWA: logo -->
  <div class="navbar-start">
    <!-- Hamburger — tylko mobile -->
    <div class="dropdown lg:hidden">
      <label tabindex="0" class="btn btn-ghost btn-sm btn-circle">
        <!-- Ikona hamburger (outline, currentColor) -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
      </label>
      <!-- Menu mobilne -->
      <ul tabindex="0" class="menu menu-sm dropdown-content mt-2 z-20 p-2 shadow-lg bg-base-100 border border-base-300 rounded-box w-56 gap-0.5">
        <li>
          <a href="/" class="gap-2 nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">

            </svg>
            Home
          </a>
        </li>
        <li>
          <button class="gap-2 nav-link"
            hx-get="/modules/issues/" hx-target="#main-content" hx-push-url="true">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 12.75c1.148 0 2.278.08 3.383.237 1.037.146 1.866.966 1.866 2.013 0 3.728-2.35 6.75-5.25 6.75S6.75 18.728 6.75 15c0-1.046.83-1.867 1.866-2.013A24.204 24.204 0 0 1 12 12.75Zm0 0c2.883 0 5.647.508 8.207 1.44a23.91 23.91 0 0 1-1.152 6.06M12 12.75c-2.883 0-5.647.508-8.208 1.44a23.91 23.91 0 0 0 1.153 6.06M12 12.75a2.25 2.25 0 0 0 2.248-2.354M12 12.75a2.25 2.25 0 0 1-2.248-2.354M12 8.25c.995 0 1.971-.08 2.922-.236.403-.066.74-.358.795-.762a3.778 3.778 0 0 0-.399-2.25M12 8.25c-.995 0-1.97-.08-2.922-.236-.402-.066-.74-.358-.795-.762a3.778 3.778 0 0 1 .4-2.253M12 8.25a2.25 2.25 0 0 0-2.248 2.146M12 8.25a2.25 2.25 0 0 1 2.248 2.146M8.683 5a6.032 6.032 0 0 1-1.155-1.002c.07-.63.27-1.222.574-1.747m.581 2.749A3.75 3.75 0 0 1 15.318 5m0 0c.427-.283.815-.62 1.155-.999a4.471 4.471 0 0 0-.575-1.752M4.921 6a24.048 24.048 0 0 0-.392 3.314c1.668.546 3.416.914 5.223 1.082M19.08 6c.205 1.08.337 2.187.392 3.314a23.882 23.882 0 0 1-5.223 1.082" />
            </svg>
            Issues
          </button>
        </li>
        <li>
          <button class="gap-2 nav-link"
            hx-get="/modules/projekty/" hx-target="#main-content" hx-push-url="true">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-8.69-6.44-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v8.25m19.5 0v.75A2.25 2.25 0 0 1 19.5 17.25h-15A2.25 2.25 0 0 1 2.25 15v-.75m19.5 0h-19.5" />
            </svg>
            Projekty
          </button>
        </li>
        <li class="opacity-40 pointer-events-none">
          <span class="gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
            </svg>
            Kanban
          </span>
        </li>
      </ul>
    </div>

    <!-- Logo — tekst, bez kolorowych ikon -->
    <a href="/" class="btn btn-ghost btn-sm text-sm font-semibold tracking-wide uppercase text-base-content/80 px-2">
      IT Project OS
    </a>
  </div>

  <!-- ŚRODEK: menu poziome (tylko desktop) -->
  <div class="navbar-center hidden lg:flex">
    <ul class="menu menu-horizontal px-1 gap-0.5 text-sm">

      <!-- Home -->
      <li>
        <a href="/" class="gap-1.5 nav-link px-3 py-1.5 text-sm font-medium text-base-content/70 hover:text-base-content flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
          </svg>
          Home
        </a>
      </li>

      <!-- Issues -->
      <li>
        <button class="gap-1.5 nav-link px-3 py-1.5 text-sm font-medium text-base-content/70 hover:text-base-content"
          hx-get="/modules/issues/" hx-target="#main-content" hx-push-url="true">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 12.75c1.148 0 2.278.08 3.383.237 1.037.146 1.866.966 1.866 2.013 0 3.728-2.35 6.75-5.25 6.75S6.75 18.728 6.75 15c0-1.046.83-1.867 1.866-2.013A24.204 24.204 0 0 1 12 12.75Zm0 0c2.883 0 5.647.508 8.207 1.44a23.91 23.91 0 0 1-1.152 6.06M12 12.75c-2.883 0-5.647.508-8.208 1.44a23.91 23.91 0 0 0 1.153 6.06M12 12.75a2.25 2.25 0 0 0 2.248-2.354M12 12.75a2.25 2.25 0 0 1-2.248-2.354M12 8.25c.995 0 1.971-.08 2.922-.236.403-.066.74-.358.795-.762a3.778 3.778 0 0 0-.399-2.25M12 8.25c-.995 0-1.97-.08-2.922-.236-.402-.066-.74-.358-.795-.762a3.778 3.778 0 0 1 .4-2.253M12 8.25a2.25 2.25 0 0 0-2.248 2.146M12 8.25a2.25 2.25 0 0 1 2.248 2.146M8.683 5a6.032 6.032 0 0 1-1.155-1.002c.07-.63.27-1.222.574-1.747m.581 2.749A3.75 3.75 0 0 1 15.318 5m0 0c.427-.283.815-.62 1.155-.999a4.471 4.471 0 0 0-.575-1.752M4.921 6a24.048 24.048 0 0 0-.392 3.314c1.668.546 3.416.914 5.223 1.082M19.08 6c.205 1.08.337 2.187.392 3.314a23.882 23.882 0 0 1-5.223 1.082" />
          </svg>
          Issues
        </button>
      </li>

      <!-- Projekty -->
      <li>
        <button class="gap-1.5 nav-link px-3 py-1.5 text-sm font-medium text-base-content/70 hover:text-base-content"
          hx-get="/modules/projekty/" hx-target="#main-content" hx-push-url="true">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-8.69-6.44-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v8.25m19.5 0v.75A2.25 2.25 0 0 1 19.5 17.25h-15A2.25 2.25 0 0 1 2.25 15v-.75m19.5 0h-19.5" />
          </svg>
          Projekty
        </button>
      </li>

      <!-- Kanban — wkrótce, nieaktywny -->
      <li class="opacity-40 pointer-events-none select-none">
        <span class="gap-1.5 px-3 py-1.5 text-sm font-medium flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
          </svg>
          Kanban
          <span class="text-[10px] leading-none px-1 py-0.5 rounded border border-current ml-1 opacity-70">wkrótce</span>
        </span>
      </li>

      <!-- Raporty — wkrótce, nieaktywny -->
      <li class="opacity-40 pointer-events-none select-none">
        <span class="gap-1.5 px-3 py-1.5 text-sm font-medium flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
          </svg>
          Raporty
          <span class="text-[10px] leading-none px-1 py-0.5 rounded border border-current ml-1 opacity-70">wkrótce</span>
        </span>
      </li>

    </ul>
  </div>

  <!-- PRAWA: toggle motywu + awatar użytkownika -->
  <div class="navbar-end gap-1">

    <!-- Przycisk przełącznika dark / light -->
    <button
      class="btn btn-ghost btn-sm btn-circle"
      onclick="toggleTheme()"
      title="Przełącz motyw"
      aria-label="Przełącz motyw ciemny / jasny">
      <!-- Ikona słońca — widoczna w trybie ciemnym -->
      <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
      </svg>
      <!-- Ikona księżyca — widoczna w trybie jasnym -->
      <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
      </svg>
    </button>

    <!-- Separator pionowy -->
    <div class="divider divider-horizontal mx-0 h-5 self-center opacity-30"></div>

    {% if user %}
      <!-- Dropdown awatara użytkownika -->
      <div class="dropdown dropdown-end">
        <label tabindex="0" class="btn btn-ghost btn-sm gap-2 px-2 cursor-pointer">
          <!-- Krąg z inicjałami użytkownika -->
          <div class="avatar-initials w-7 h-7 text-xs flex-shrink-0">
            {{ (user.name or user.preferred_username or "?")[:2]|upper }}
          </div>
          <!-- Imię + rola (tylko desktop) -->
          <div class="hidden lg:flex flex-col items-start leading-tight">
            <span class="text-xs font-medium text-base-content truncate max-w-[120px]">
              {{ user.name or user.preferred_username or user.email }}
            </span>
            {% if user.roles %}
              <span class="text-[10px] text-base-content/50">{{ user.roles[0] }}</span>
            {% else %}
              <span class="text-[10px] text-base-content/50">użytkownik</span>
            {% endif %}
          </div>
          <!-- Chevron down -->
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-base-content/40 hidden lg:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
          </svg>
        </label>
        <!-- Menu dropdownu -->
        <ul tabindex="0" class="menu menu-sm dropdown-content mt-2 z-20 p-1.5 shadow-lg bg-base-100 border border-base-300 rounded-box w-52 gap-0.5">
          <!-- Nagłówek — email użytkownika -->
          <li class="px-3 py-2 border-b border-base-300 mb-1">
            <div class="flex flex-col gap-0.5 pointer-events-none">
              <span class="text-xs font-medium text-base-content truncate">
                {{ user.name or user.preferred_username }}
              </span>
              <span class="text-[11px] text-base-content/50 truncate">{{ user.email }}</span>
            </div>
          </li>
          <!-- Mój profil -->
          <li>
            <a href="/profile" class="flex gap-2 items-center text-sm text-base-content/80 hover:text-base-content">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
              </svg>
              Mój profil
            </a>
          </li>
          <li class="border-t border-base-300 mt-1 pt-1">
            <a href="/logout" class="flex gap-2 items-center text-sm text-base-content/60 hover:text-base-content">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" />
              </svg>
              Wyloguj
            </a>
          </li>
        </ul>
      </div>
    {% else %}
      <a href="/login" class="btn btn-outline btn-sm text-xs gap-1.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
        </svg>
        Zaloguj
      </a>
    {% endif %}
  </div>
</div>
