<!-- Partial strony 404 — wyświetlany gdy żądana strona nie istnieje -->
<div class="hero min-h-[40vh]">
  <div class="hero-content text-center">
    <div class="max-w-md">
      <h1 class="text-8xl font-bold text-error">404</h1>
      <p class="py-6 text-base-content/70">Nie znaleziono strony</p>
      <!-- Przycisk powrotu — ładuje stronę główną przez HTMX -->
      <button
        class="btn btn-primary"
        hx-get="/"
        hx-target="#main-content"
        hx-push-url="true"
      >
        Wróć na stronę główną
      </button>
    </div>
  </div>
</div>
