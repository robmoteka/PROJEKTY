events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Format logów
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    # ------------------------------------------------------------------ #
    #  Serwer główny — brama wejściowa systemu (port 80 wewnątrz Dockera,
    #  eksponowany jako 5050 na hoście)
    # ------------------------------------------------------------------ #

    server {
        listen 80;
        server_name localhost;

        # Pliki statyczne (CSS, JS, obrazy) serwowane bezpośrednio przez Nginx
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # Moduł Issues — proxy do kontenera module-issues
        # auth_request sprawdza sesję użytkownika przed przekazaniem requestu do modułu
        location /modules/issues/ {
            # Weryfikacja sesji przez Shell — blokuje dostęp anonimowych użytkowników
            auth_request /auth/verify;

            # Odczytujemy nagłówki X-User-* z odpowiedzi weryfikacyjnej Shell
            auth_request_set $user_sub   $upstream_http_x_user_sub;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_name  $upstream_http_x_user_name;
            auth_request_set $user_roles $upstream_http_x_user_roles;

            # Przekierowanie na login gdy auth_request zwróci 401
            error_page 401 = @login_redirect;

            proxy_pass         http://module-issues:8000/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Dane tożsamości użytkownika przekazane z weryfikacji sesji
            proxy_set_header   X-User-Sub        $user_sub;
            proxy_set_header   X-User-Email      $user_email;
            proxy_set_header   X-User-Name       $user_name;
            proxy_set_header   X-User-Roles      $user_roles;
            # Przekazujemy nagłówki HTMX bez zmian
            proxy_set_header   HX-Request        $http_hx_request;
            proxy_set_header   HX-Current-URL    $http_hx_current_url;
            proxy_set_header   HX-Target         $http_hx_target;
        }

        # Wewnętrzny endpoint weryfikacji sesji — wywoływany wyłącznie przez auth_request
        location = /auth/verify {
            internal;
            proxy_pass             http://shell:8000/api/verify-session;
            # Nie przekazujemy body requestu — tylko cookie sesyjne
            proxy_pass_request_body off;
            proxy_set_header       Content-Length "";
            # Przekazujemy cookie aby Shell mógł zidentyfikować sesję
            proxy_set_header       Cookie $http_cookie;
            proxy_set_header       X-Original-URI $request_uri;
        }

        # Redirect na /login przy braku autoryzacji (obsługa dla HTMX i przeglądarki)
        location @login_redirect {
            return 302 /login;
        }

        # Shell — proxy dla wszystkich pozostałych ścieżek (layout, auth, itd.)
        location / {
            proxy_pass         http://shell:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   HX-Request        $http_hx_request;
            proxy_set_header   HX-Current-URL    $http_hx_current_url;
            proxy_set_header   HX-Target         $http_hx_target;
        }
    }
}
