<!-- Wiersz tabeli projektu — partial wstawiany w pętli for projects w list.html -->
<tr id="project-{{ project.id }}">
  <td><span class="badge badge-ghost">{{ project.code }}</span></td>
  <td>
    <!-- Klikalny link do karty projektu -->
    <a class="link link-hover link-primary cursor-pointer"
       hx-get="/modules/projekty/{{ project.id }}"
       hx-target="#main-content"
       hx-swap="innerHTML">
      {{ project.name }}
    </a>
  </td>
  <td><span class="badge badge-outline">{{ project.status }}</span></td>
  <td>{{ project.owner_name or '—' }}</td>
  <td>
    {% if project.end_date %}
      {{ project.end_date.strftime('%d.%m.%Y') }}
    {% else %}—{% endif %}
  </td>
  <td class="flex gap-1">
    <button class="btn btn-ghost btn-xs"
            hx-get="/modules/projekty/{{ project.id }}/edit"
            hx-target="#main-content"
            hx-swap="innerHTML">
      Edytuj
    </button>
    <button class="btn btn-ghost btn-xs text-error"
            hx-delete="/modules/projekty/{{ project.id }}"
            hx-target="#project-{{ project.id }}"
            hx-swap="outerHTML"
            hx-confirm="Czy na pewno chcesz usunąć projekt {{ project.code }}?">
      Usuń
    </button>
  </td>
</tr>
