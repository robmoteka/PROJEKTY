<!-- Layout z sidebare'm — wrapper dla wszystkich szablonów module-projekty -->
<!-- Ujemne marginesy anulują padding p-6 z #main-content w base.html — sidebar dosięga krawędzi przeglądarki -->
<div class="flex flex-col lg:flex-row -mx-6 -mt-6 min-h-[calc(100vh-3.5rem)]">

  <!-- Mobilny pasek nawigacji — przepływa w dokumencie (nie absolute), widoczny tylko poniżej lg -->
  <div class="lg:hidden flex items-center gap-1 w-full px-4 py-2 bg-base-100 border-b border-base-300">
    <button hx-get="/modules/projekty/" hx-target="#main-content" hx-push-url="true" class="btn btn-ghost btn-sm gap-1.5 text-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-8.69-6.44-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v8.25m19.5 0v.75A2.25 2.25 0 0 1 19.5 17.25h-15A2.25 2.25 0 0 1 2.25 15v-.75m19.5 0h-19.5" />
      </svg>
      Projekty
    </button>
    <button hx-get="/modules/projekty/servers" hx-target="#main-content" hx-push-url="true" class="btn btn-ghost btn-sm gap-1.5 text-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 0 1-3-3m3 3a3 3 0 1 0 0 6h13.5a3 3 0 1 0 0-6m-16.5-3a3 3 0 0 1 3-3h13.5a3 3 0 0 1 3 3M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Zm0 9a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z" />
      </svg>
      Serwery
    </button>
  </div>

  <!-- Sidebar — widoczny tylko na lg+, przyklejony do lewej krawędzi -->
  <aside class="hidden lg:flex flex-col w-60 flex-shrink-0 sticky top-0 h-[calc(100vh-3.5rem)] overflow-y-auto bg-base-100 border-r border-base-300 p-3 gap-0.5">

    <!-- Sekcja: Projekty -->
    <p class="text-xs font-semibold uppercase tracking-widest text-base-content/40 px-3 pt-3 pb-2">Projekty</p>

    <nav class="flex flex-col gap-0.5">
      <!-- Lista projektów -->
      <button
        hx-get="/modules/projekty/"
        hx-target="#main-content"
        hx-push-url="true"
        class="nav-link flex items-center gap-2.5 px-3 py-2 text-sm text-left {{ 'nav-link-active' if active_section == 'projects' else '' }}">
        <!-- Ikona: folder (spójna z navbar) -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-8.69-6.44-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v8.25m19.5 0v.75A2.25 2.25 0 0 1 19.5 17.25h-15A2.25 2.25 0 0 1 2.25 15v-.75m19.5 0h-19.5" />
        </svg>
        Lista projektów
      </button>

      <!-- Nowy projekt -->
      <button
        hx-get="/modules/projekty/create"
        hx-target="#main-content"
        hx-push-url="true"
        class="nav-link flex items-center gap-2.5 px-3 py-2 text-sm text-left">
        <!-- Ikona: plus -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        Nowy projekt
      </button>
    </nav>

    <div class="divider my-1"></div>

    <!-- Sekcja: Serwery -->
    <p class="text-xs font-semibold uppercase tracking-widest text-base-content/40 px-3 pb-2">Serwery</p>

    <nav class="flex flex-col gap-0.5">
      <!-- Lista serwerów -->
      <button
        hx-get="/modules/projekty/servers"
        hx-target="#main-content"
        hx-push-url="true"
        class="nav-link flex items-center gap-2.5 px-3 py-2 text-sm text-left {{ 'nav-link-active' if active_section == 'servers' else '' }}">
        <!-- Ikona: serwer (server stack) -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 0 1-3-3m3 3a3 3 0 1 0 0 6h13.5a3 3 0 1 0 0-6m-16.5-3a3 3 0 0 1 3-3h13.5a3 3 0 0 1 3 3M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Zm0 9a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z" />
        </svg>
        Lista serwerów
      </button>

      <!-- Nowy serwer -->
      <button
        hx-get="/modules/projekty/servers/create"
        hx-target="#main-content"
        hx-push-url="true"
        class="nav-link flex items-center gap-2.5 px-3 py-2 text-sm text-left">
        <!-- Ikona: plus -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        Nowy serwer
      </button>
    </nav>

  </aside>

  <!-- Główna treść modułu — zajmuje pozostałą szerokość viewportu -->
  <main class="flex-1 min-w-0 p-8 overflow-y-auto">
    <div class="max-w-5xl mx-auto">
      {% block content %}{% endblock %}
    </div>
  </main>

</div>
