<!-- Wiersz tabeli serwera — partial dołączany przez include wewnątrz pętli for w servers/list.html -->
<!-- Cały wiersz jest klikalny i prowadzi do karty serwera; przyciski akcji blokują propagację -->
<tr id="server-{{ server.id }}"
    class="hover cursor-pointer"
    hx-get="/modules/projekty/servers/{{ server.id }}"
    hx-target="#main-content"
    hx-swap="innerHTML"
    hx-push-url="true"
    hx-trigger="click[!event.target.closest('button')]">
  <td>
    <!-- Nazwa serwera — nawigacja obsługiwana przez kliknięcie wiersza -->
    <span class="link link-hover link-primary">{{ server.name }}</span>
  </td>
  <td>{{ server.hostname }}</td>
  <td><span class="badge badge-sm">{{ server.server_type }}</span></td>
  <td>{{ server.operating_system or '—' }}</td>
  <td>
    <span class="badge badge-sm {{ 'badge-success' if server.status == 'Aktywny' else 'badge-error' }}">
      {{ server.status }}
    </span>
  </td>
  <td class="flex gap-1">
    <!-- Przycisk edycji serwera -->
    <button class="btn btn-ghost btn-xs btn-square"
            title="Edytuj"
            aria-label="Edytuj"
            hx-get="/modules/projekty/servers/{{ server.id }}/edit"
            hx-target="#main-content"
            hx-swap="innerHTML">
      <!-- Ikona: ołówek -->
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125" />
      </svg>
    </button>
    <!-- Przycisk usunięcia serwera -->
    <button class="btn btn-ghost btn-xs btn-square text-error"
            title="Usuń"
            aria-label="Usuń"
            hx-delete="/modules/projekty/servers/{{ server.id }}"
            hx-target="#server-{{ server.id }}"
            hx-swap="outerHTML"
            hx-confirm="Czy na pewno chcesz usunąć serwer {{ server.name }}?">
      <!-- Ikona: kosz -->
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
      </svg>
    </button>
  </td>
</tr>
