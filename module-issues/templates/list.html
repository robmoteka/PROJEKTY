<!-- Lista zgłoszeń — HTML partial ładowany do #main-content Shell przez HTMX -->
<div class="space-y-4">
  <div class="flex justify-between items-center">
    <h2 class="text-2xl font-bold">Zgłoszenia</h2>
    <button
      class="btn btn-primary btn-sm"
      hx-get="/modules/issues/create"
      hx-target="#main-content"
      hx-swap="innerHTML"
    >
      + Nowe zgłoszenie
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="table table-zebra w-full">
      <thead>
        <tr>
          <th>#</th>
          <th>Tytuł</th>
          <th>Status</th>
          <th>Priorytet</th>
          <th>Autor</th>
          <th>Akcje</th>
        </tr>
      </thead>
      <tbody id="issues-tbody">
        {% for issue in issues %}
          {% include "partials/issue_row.html" %}
        {% else %}
          <!-- Komunikat gdy brak zgłoszeń -->
          <tr>
            <td colspan="6" class="text-center text-base-content/50 py-8">
              Brak zgłoszeń. Kliknij "+ Nowe zgłoszenie", aby dodać pierwsze.
            </td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
