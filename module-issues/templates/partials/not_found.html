<!-- Partial komunikatu 404 — wyświetlany gdy zgłoszenie nie istnieje -->
<div class="alert alert-error max-w-lg mx-auto mt-8">
  <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
  </svg>
  <div>
    <h3 class="font-bold">Nie znaleziono zgłoszenia</h3>
    <p class="text-sm">Zgłoszenie #{{ issue_id }} nie istnieje lub zostało usunięte.</p>
  </div>
  <button
    class="btn btn-sm"
    hx-get="/modules/issues/list"
    hx-target="#main-content"
    hx-swap="innerHTML"
  >
    Wróć do listy
  </button>
</div>
